<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Onigiri.Z | Enterprise Blockchain Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app">
        <header>
            <div class="brand">
                <span class="brand-icon">🍙</span>
                <h1>Onigiri.Z <span class="tag">Enterprise</span></h1>
            </div>
            <div class="header-right">
                <a href="./learn.html" class="btn btn-lang">Learn</a>
                <div class="user-pill">
                    <div>
                        <div class="name" id="display-user">Guest</div>
                        <div class="wallet" id="display-wallet">…</div>
                    </div>
                    <button class="btn-logout" id="logout-btn">Logout</button>
                </div>
                <div class="status">Node: <span>Online</span></div>
            </div>
        </header>

        <main>
            <div class="col">
                <div class="sec-head">
                    <h2>Blockchain Explorer</h2>
                    <button class="btn-icon" id="refresh-btn">🔄</button>
                </div>
                <div class="blocks" id="blocks"></div>
            </div>

            <div class="col">
                <div class="controls">

                    <!-- Wallet Card -->
                    <div class="card wallet-card">
                        <div class="wallet-header">
                            <div>
                                <h3>My Wallet</h3>
                                <div class="balance-display">
                                    <span class="balance-amount" id="balance-amount">0.00</span>
                                    <span class="balance-unit">OGZ</span>
                                </div>
                                <div class="balance-breakdown">
                                    <span class="bal-sent">↑ Sent: <strong id="bal-sent">0</strong></span>
                                    <span class="bal-recv">↓ Received: <strong id="bal-recv">0</strong></span>
                                </div>
                            </div>
                            <div class="qr-section">
                                <canvas id="qr-canvas"></canvas>
                            </div>
                        </div>
                        <div class="wallet-addr-row">
                            <code id="full-wallet-addr">...</code>
                            <button class="btn-copy" id="copy-addr-btn" title="Copy address">📋</button>
                        </div>
                    </div>

                    <!-- Transaction Form -->
                    <div class="card">
                        <h3>New Transaction</h3>
                        <form id="tx-form">
                            <div class="input-group">
                                <label for="sender">From (Your Wallet)</label>
                                <input type="text" id="sender" readonly>
                            </div>
                            <div class="input-group">
                                <label for="receiver">To (Recipient Address)</label>
                                <input type="text" id="receiver" placeholder="ogz_recipient_address" required>
                            </div>
                            <div class="input-group">
                                <label for="amount">Amount (OGZ)</label>
                                <input type="number" id="amount" step="0.01" placeholder="0.00" required>
                            </div>
                            <button type="submit" class="btn btn-primary">Queue Transaction</button>
                        </form>
                    </div>

                    <!-- Mempool -->
                    <div class="card">
                        <div class="card-head">
                            <h3>Transaction Pool</h3>
                            <span class="count" id="mempool-count">0</span>
                        </div>
                        <div id="mempool">
                            <p class="empty">No pending transactions</p>
                        </div>
                        <button class="btn btn-mine hidden" id="mine-btn">
                            <span class="mine-text">⛏️ Mine Block</span>
                            <span class="spinner"></span>
                        </button>
                    </div>

                    <!-- Stats -->
                    <div class="card">
                        <h3>Network Stats</h3>
                        <div class="stats">
                            <div class="stat">
                                <div class="label">Difficulty</div>
                                <div class="value">4</div>
                            </div>
                            <div class="stat">
                                <div class="label">Blocks</div>
                                <div class="value" id="total-blocks">0</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer>&copy; 2026 Onigiri.Z Enterprise</footer>
    </div>

    <div class="toast" id="toast"></div>
    <script type="module" src="./src/main.ts"></script>
</body>

</html>
