<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Onigiri.Z Enterprise</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-shell">
        <div class="card auth-card">
            <div class="auth-logo">🍙</div>
            <h1>Onigiri.Z</h1>
            <p class="auth-sub">Request a password reset link</p>

            <form id="forgot-form" class="auth-form">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="Enter your registered email" required>
                </div>
                <button type="submit" id="auth-submit" class="btn btn-primary">Send Reset Link</button>
            </form>

            <div class="auth-footer" style="margin-top: 1.5rem">
                Remember your password? <a href="./login.html" class="auth-link">Back to login</a>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <script type="module" src="./src/auth.ts"></script>
</body>
</html>
