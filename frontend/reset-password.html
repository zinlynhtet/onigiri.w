<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Onigiri.Z Enterprise</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="auth-shell">
        <div class="card auth-card">
            <div class="auth-logo">🍙</div>
            <h1>Onigiri.Z</h1>
            <p class="auth-sub">Create Your New Password</p>

            <form id="reset-form" class="auth-form">
                <div class="input-group">
                    <label for="password">New Password</label>
                    <div class="pwd-wrapper">
                        <input type="password" id="password" placeholder="Enter new password" required>
                        <button type="button" class="btn-eye" id="toggle-pwd">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path
                                    d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0" />
                                <circle cx="12" cy="12" r="3" />
                            </svg>
                        </button>
                    </div>
                </div>
                <button type="submit" id="auth-submit" class="btn btn-primary">Save New Password</button>
            </form>

            <div class="auth-footer">
                <a href="./login.html" class="auth-link">Return to login</a>
            </div>
            <div class="auth-footer">© 2026 Onigiri.Z Enterprise Systems</div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <script type="module" src="./src/auth.ts"></script>
</body>

</html>
