<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Onigiri.Z Enterprise</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="auth-shell">
        <div class="card auth-card">
            <div class="auth-logo">🍙</div>
            <h1>Onigiri.Z</h1>
            <p class="auth-sub">Secure Blockchain Node Access</p>

            <form id="login-form" class="auth-form">
                <div class="input-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" placeholder="you@example.com" required>
                </div>
                <div class="input-group">
                    <div style="display: flex; justify-content: space-between;">
                        <label for="password">Password</label>
                        <a href="./forgot-password.html" class="auth-link">Forgot?</a>
                    </div>
                    <div class="pwd-wrapper">
                        <input type="password" id="password" placeholder="Enter password" required>
                        <button type="button" class="btn-eye" id="toggle-pwd">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
                <button type="submit" id="auth-submit" class="btn btn-primary">Sign In</button>
            </form>

            <div class="auth-footer" style="margin-top: 1.5rem">
                New here? <a href="./signup.html" class="auth-link">Create an account</a>
            </div>
            <div class="auth-footer" style="margin-top: 1rem">&copy; 2026 Onigiri.Z Enterprise Systems</div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <script type="module" src="./src/auth.ts"></script>
</body>
</html>
